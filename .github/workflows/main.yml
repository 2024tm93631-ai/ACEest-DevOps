# .github/workflows/main.yml
# ACEest Fitness & Gym - Assignment 2 CI/CD Pipeline
# Triggers on every push and pull_request to main branch

name: ACEest CI/CD Pipeline v2

on:
  push:
    branches: [ main, assignment2 ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USER: bharathakash2024
  APP_NAME: aceest-fitness

jobs:
  pipeline:
    name: CI/CD Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Stage 1 - Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stage 2 - Lint & Syntax Check
        run: |
          pip install flake8
          flake8 app.py test_app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "Lint passed!"

      - name: Stage 3 - Install Dependencies
        run: |
          pip install flask pytest pytest-cov
          echo "Dependencies installed!"

      - name: Stage 4 - Run Unit Tests
        run: |
          pytest test_app.py -v --tb=short --cov=app --cov-report=xml
          echo "Tests passed!"

      - name: Stage 5 - Docker Build
        run: |
          docker build -t $DOCKER_HUB_USER/$APP_NAME:${{ github.run_number }} .
          docker build -t $DOCKER_HUB_USER/$APP_NAME:latest .
          echo "Docker image built!"

      - name: Stage 6 - Docker Push to Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "$DOCKER_HUB_USER" --password-stdin
          docker push $DOCKER_HUB_USER/$APP_NAME:${{ github.run_number }}
          docker push $DOCKER_HUB_USER/$APP_NAME:latest
          echo "Pushed to Docker Hub!"

      - name: Stage 7 - Test in Container
        run: |
          docker run --rm \
            -v $(pwd)/test_app.py:/app/test_app.py \
            --entrypoint pytest \
            $DOCKER_HUB_USER/$APP_NAME:latest \
            test_app.py -v --tb=short
          echo "Container tests passed!"

      - name: Pipeline Complete
        run: |
          echo "============================================="
          echo " BUILD SUCCESS - ACEest CI/CD Pipeline v2"
          echo "============================================="
          echo " Image: $DOCKER_HUB_USER/$APP_NAME:latest"
          echo " Run: ${{ github.run_number }}"
          echo "============================================="
