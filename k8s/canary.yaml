# k8s/canary.yaml - Canary Release Strategy
# 80% traffic to stable, 20% to canary (new version)

# Stable Deployment (80% traffic - 4 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  labels:
    app: aceest-fitness
    track: stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
    spec:
      containers:
      - name: aceest-fitness
        image: bharathakash2024/aceest-fitness:v2
        ports:
        - containerPort: 5000
---
# Canary Deployment (20% traffic - 1 replica)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  labels:
    app: aceest-fitness
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
    spec:
      containers:
      - name: aceest-fitness
        image: bharathakash2024/aceest-fitness:latest
        ports:
        - containerPort: 5000
---
# Single service routes to BOTH stable + canary (by common label)
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service
spec:
  selector:
    app: aceest-fitness   # Matches both stable and canary pods
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort
