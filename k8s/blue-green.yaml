# k8s/blue-green.yaml - Blue-Green Deployment Strategy
# Blue = current stable version (v2)
# Green = new version (v3) - switch traffic when ready

# BLUE Deployment (Current/Stable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  labels:
    app: aceest-fitness
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      slot: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        slot: blue
        version: v2
    spec:
      containers:
      - name: aceest-fitness
        image: bharathakash2024/aceest-fitness:v2
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# GREEN Deployment (New Version)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  labels:
    app: aceest-fitness
    slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      slot: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        slot: green
        version: v3
    spec:
      containers:
      - name: aceest-fitness
        image: bharathakash2024/aceest-fitness:latest
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Service - Switch between blue/green by changing selector
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service
spec:
  selector:
    app: aceest-fitness
    slot: green   # Change to 'blue' to rollback
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort
